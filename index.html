<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bible Verse Word Search Generator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg-primary: #fafafa;
      --bg-secondary: #fff;
      --text-primary: #111;
      --text-secondary: #555;
      --border-primary: #ccc;
      --border-secondary: #aaa;
      --border-grid: #444;
      --button-bg: #111;
      --button-text: #fff;
      --button-secondary-bg: #fff;
      --button-secondary-text: #111;
      --error-text: #b33;
    }

    body.dark-theme {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2d2d2d;
      --text-primary: #e0e0e0;
      --text-secondary: #b0b0b0;
      --border-primary: #444;
      --border-secondary: #555;
      --border-grid: #666;
      --button-bg: #e0e0e0;
      --button-text: #111;
      --button-secondary-bg: #2d2d2d;
      --button-secondary-text: #e0e0e0;
      --error-text: #ff6b6b;
    }

    body { 
      font-family: system-ui, Arial, sans-serif; 
      margin: 16px; 
      background: var(--bg-primary); 
      color: var(--text-primary);
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    .header-container { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 12px; 
    }
    h1 { 
      margin: 0; 
      font-size: 1.4rem; 
      flex: 1; 
      text-align: center; 
    }
    #themeToggle {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid var(--border-primary);
      background: var(--bg-secondary);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.3s ease;
    }
    #themeToggle:hover {
      opacity: 0.8;
    }
    fieldset { 
      border: 1px solid var(--border-primary); 
      padding: 10px; 
      margin-bottom: 12px; 
      border-radius: 6px; 
      background: var(--bg-secondary);
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }
    legend { font-weight: 600; font-size: 1rem; }
    label { display: block; margin: 6px 0 3px; font-size: 0.95rem; }
    input, textarea, select {
      width: 100%; padding: 8px; font-size: 1rem;
      border: 1px solid var(--border-secondary); 
      border-radius: 4px; 
      box-sizing: border-box;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
    }
    textarea { min-height: 90px; resize: vertical; }
    button {
      padding: 10px 14px; margin-top: 8px;
      border-radius: 6px; border: 1px solid var(--button-bg);
      background: var(--button-bg); color: var(--button-text); font-weight: 600;
      cursor: pointer; width: 100%;
      transition: all 0.3s ease;
    }
    button.secondary { 
      background: var(--button-secondary-bg); 
      color: var(--button-secondary-text); 
      border: 1px solid var(--border-primary); 
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    @media (min-width:600px) { button { width: auto; margin-right: 8px; } }
    #previewContainer { margin-top: 16px; text-align: center; }
    #previewTitle { font-weight: bold; margin-bottom: 8px; }
    #previewGrid {
      border-collapse: collapse; margin: 0 auto; user-select: none;
    }
    #previewGrid td {
      width: 28px; height: 28px;
      text-align: center; 
      border: 1px solid var(--border-grid); 
      font-weight: bold;
      font-size: 16px;
      background: var(--bg-secondary);
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }
    #previewVerse { margin-top: 12px; font-size: 0.95rem; text-align: center; }
    #previewReference { text-align: center; font-style: italic; font-size: 0.9rem; margin-top: 4px; }
    #messages { 
      margin-top: 10px; 
      color: var(--error-text); 
      font-weight: 600; 
      text-align: center;
      transition: color 0.3s ease;
    }
  </style>
</head>
<body>
  <div class="header-container">
    <div style="width: 100px;"></div>
    <h1>Bible Verse Word Search Generator</h1>
    <button id="themeToggle">🌙 Dark</button>
  </div>

  <fieldset>
    <legend>Bible Version</legend>
    <label for="versionSelect">Select Version</label>
    <select id="versionSelect">
      <option value="">-- Choose Version --</option>
      <option value="Bibles/demo.json">Demo</option>
      <option value="Bibles/kjv.json">King James</option>
    </select>
  </fieldset>

  <fieldset>
    <legend>Select a Verse (optional)</legend>
    <label for="bookSelect">Book</label>
    <select id="bookSelect"><option value="">-- Select Book --</option></select>

    <label for="chapterSelect">Chapter</label>
    <select id="chapterSelect" disabled><option value="">-- Select Chapter --</option></select>

    <label for="verseSelect">Verse</label>
    <select id="verseSelect" disabled><option value="">-- Select Verse --</option></select>
  </fieldset>

  <fieldset>
    <legend>Puzzle Details</legend>
    <label for="title">Puzzle Title (optional)</label>
    <input id="title" type="text" placeholder="e.g., Psalm 23 Word Search" />

    <label for="verse">Bible Verse</label>
    <textarea id="verse" placeholder="Paste or type verse here..."></textarea>

    <label for="words">Target Words (subset of verse; comma or line separated)</label>
    <textarea id="words" placeholder="LORD, shepherd, mercy"></textarea>

    <label for="reference">Verse Reference</label>
    <input id="reference" type="text" placeholder="Psalm 23:1" />
  </fieldset>

  <button id="btnGenerate">Generate Preview</button>
  <button id="btnExport" class="secondary" disabled>Export PDFs</button>
  <button id="btnClear" class="secondary">Clear</button>

  <div id="messages" style="margin-top:10px;font-weight:600;text-align:center;"></div>

  <div id="previewContainer">
    <div id="previewTitle"></div>
    <table id="previewGrid"></table>
    <div id="previewVerse"></div>
    <div id="previewReference"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
